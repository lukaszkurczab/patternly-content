name: Real content release gate

on:
  workflow_dispatch:

jobs:
  real-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Algorithms validate hard gate
        run: npm run validate:real:algorithms
      - name: Algorithms build hard gate
        run: npm run build:real:algorithms
      - name: Certification validate hard gate
        run: npm run validate:real:certification
      - name: Certification build hard gate
        run: npm run build:real:certification
