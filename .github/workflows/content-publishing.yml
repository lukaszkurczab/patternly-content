name: Content publishing architecture

on:
  push:
  pull_request:

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
  real-content-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Algorithms real-content validate (manual input may be absent)
        run: npm run validate:real:algorithms
        continue-on-error: true
      - name: Algorithms real-content build (manual input may be absent)
        run: npm run build:real:algorithms
        continue-on-error: true
      - name: Certification real-content validate (manual input may be absent)
        run: npm run validate:real:certification
        continue-on-error: true
      - name: Certification real-content build (manual input may be absent)
        run: npm run build:real:certification
        continue-on-error: true
