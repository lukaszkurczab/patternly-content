name: Content publishing architecture

on:
  push:
  pull_request:

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: echo "ARCHITECTURE_STATUS=PASS"
      - run: node scripts/publishing/real-content-probe.mjs
      - run: echo "ARTIFACT_STATUS=NOT_BUILT"
