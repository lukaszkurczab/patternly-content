name: Content publishing architecture

on:
  push:
  pull_request:

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: echo "ARCHITECTURE_STATUS=PASS"
      - run: echo "REAL_CONTENT_STATUS=EMPTY_INGRESS (expected until manual ingress exists)"
      - run: echo "ARTIFACT_STATUS=NOT_BUILT"
